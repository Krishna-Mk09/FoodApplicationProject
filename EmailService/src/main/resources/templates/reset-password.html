<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Password Reset</title>
</head>
<body style="font-family: Arial, sans-serif; background-color: #f1f1f1; padding: 30px;">
<div style="max-width: 600px; background-color: #fff; margin: auto; padding: 25px; border-radius: 8px; box-shadow: 0 0 8px rgba(0,0,0,0.15);">
    <h2 style="color: #e74c3c;">Reset Your Password</h2>
    <p>Hi <span th:text="${name}">User</span>,</p>
    <p>We received a request to reset your password. Click the button below to proceed:</p>
    <a th:href="${resetLink}" style="background-color: #3498db; color: white; padding: 10px 20px; text-decoration: none; border-radius: 5px;">Reset Password</a>
    <p>If you did not request a password reset, you can ignore this email.</p>
    <br/>
    <p>Thanks,<br/>EMS Support Team</p>
</div>
</body>
</html>
