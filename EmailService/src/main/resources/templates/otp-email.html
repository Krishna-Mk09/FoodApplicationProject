<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Your OTP Code</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            text-align: center;
            padding: 20px;
        }
        .container {
            background-color: #ffffff;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0px 0px 10px rgba(0, 0, 0, 0.1);
            max-width: 400px;
            margin: auto;
        }
        h2 {
            color: #333;
        }
        .otp {
            font-size: 24px;
            font-weight: bold;
            color: #007bff;
            padding: 10px;
            background-color: #f8f9fa;
            display: inline-block;
            border-radius: 4px;
            margin: 10px 0;
        }
        p {
            color: #555;
        }
        .footer {
            margin-top: 20px;
            font-size: 12px;
            color: #888;
        }
    </style>
</head>
<body>
<div class="container">
    <h2>Your One-Time Password (OTP) is </h2>
    <p><strong>OTP:</strong> <span th:text="${OTP}"></span></p>
    <p>This OTP is valid for <b>5 minutes</b>. Do not share it with anyone.</p>
    <p>If you did not request this, please ignore this email.</p>
    <div class="footer">© 2025 Zomaato Platform. All rights reserved.</div>
</div>
</body>
</html>
