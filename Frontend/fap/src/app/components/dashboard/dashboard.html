<app-header></app-header>
<main class="dashboard">
    <div class="hero-section">
        <h2>Discover the best food & drinks in Bangalore</h2>
    </div>

    <div class="restaurant-grid">
        <div class="restaurant-card" *ngFor="let restaurant of restaurants" (click)="goToRestaurant(restaurant.id)">
            <div class="card-image">
                <img [src]="restaurant.image" [alt]="restaurant.name">
                <div class="promoted-badge" *ngIf="restaurant.promoted">Promoted</div>
                <div class="eta-badge">{{restaurant.eta}}</div>
            </div>
            <div class="card-content">
                <div class="title-row">
                    <h3>{{restaurant.name}}</h3>
                    <div class="rating"><span>{{restaurant.rating}}</span> ★</div>
                </div>
                <div class="subtitle-row">
                    <span class="cuisine">{{restaurant.cuisine}}</span>
                    <span class="price">{{restaurant.priceForTwo}}</span>
                </div>
            </div>
        </div>
    </div>
</main>
<app-footer></app-footer>
